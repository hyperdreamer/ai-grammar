<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Grammar Checker — Test Page</title>
<style>
  :root {
    --ag-bg: #0f172a;
    --ag-surface: #1e293b;
    --ag-border: #334155;
    --ag-text: #e2e8f0;
    --ag-text-muted: #94a3b8;
    --ag-text-dim: #64748b;
    --ag-accent: #4ade80;
    --ag-accent-hover: #22c55e;
    --ag-accent-text: #0f172a;
    --ag-error: #f87171;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ag-bg: #ffffff;
      --ag-surface: #f8fafc;
      --ag-border: #e2e8f0;
      --ag-text: #0f172a;
      --ag-text-muted: #475569;
      --ag-text-dim: #64748b;
      --ag-accent: #16a34a;
      --ag-accent-hover: #15803d;
      --ag-accent-text: #ffffff;
      --ag-error: #dc2626;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--ag-bg); color: var(--ag-text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .subtitle { color: var(--ag-text-dim); font-size: 13px; margin-bottom: 24px; }
  .test-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
  .test-btn {
    background: var(--ag-surface); border: 1px solid var(--ag-border);
    color: var(--ag-text); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-family: inherit;
    transition: background 0.15s;
  }
  .test-btn:hover { background: var(--ag-border); }
  .chatbox {
    width: 100%; max-width: 640px; background: var(--ag-surface);
    border-radius: 12px; border: 1px solid var(--ag-border); overflow: hidden;
  }
  .messages {
    min-height: 200px; max-height: 400px; overflow-y: auto;
    padding: 16px;
  }
  .message {
    padding: 10px 14px; border-radius: 10px; margin-bottom: 10px;
    max-width: 85%; line-height: 1.6; font-size: 14px;
  }
  .user-msg { background: var(--ag-border); margin-left: auto; }
  .reply-msg { background: var(--ag-bg); border: 1px solid var(--ag-border); margin-right: auto; }
  .system-msg { color: var(--ag-text-muted); font-size: 12px; text-align: center; }
  .input-row { display: flex; padding: 12px 16px; gap: 8px; border-top: 1px solid var(--ag-border); }
  .input-row textarea {
    flex: 1; background: var(--ag-bg); border: 1px solid var(--ag-border);
    border-radius: 8px; color: var(--ag-text); font-family: inherit;
    font-size: 14px; padding: 10px 12px; resize: none; outline: none;
    min-height: 44px; max-height: 120px;
  }
  .input-row textarea:focus { border-color: var(--ag-accent); }
  .input-row button {
    background: var(--ag-accent); color: var(--ag-accent-text);
    border: none; border-radius: 8px; padding: 0 20px;
    font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
  }
  .input-row button:hover { background: var(--ag-accent-hover); }
  .status-bar {
    width: 100%; max-width: 640px; margin-top: 12px;
    font-size: 12px; color: var(--ag-text-dim); display: flex; justify-content: space-between;
  }
  .status-bar .ok { color: var(--ag-accent); }
  kbd {
    background: var(--ag-border); border: 1px solid var(--ag-text-muted);
    border-radius: 3px; padding: 1px 6px; font-family: monospace; font-size: 11px;
  }
</style>
</head>
<body>
  <h1>🔍 AI Grammar Checker</h1>
  <p class="subtitle">Test page — type text with errors and submit, or use <kbd>?/</kbd> commands</p>

  <div class="test-grid">
    <button class="test-btn" onclick="fillAndSend('I has a apple and she go to store')">Grammar errors</button>
    <button class="test-btn" onclick="fillAndSend('Their going to the party tomorow')">Spelling errors</button>
    <button class="test-btn" onclick="fillAndSend('Due to the fact that we are in receipt of your letter')">Wordiness</button>
    <button class="test-btn" onclick="fillText('?/help')">?/help</button>
    <button class="test-btn" onclick="fillText('I has a apple and she go to store ?/fix')">?/fix</button>
    <button class="test-btn" onclick="fillText('due to the fact that we are in receipt of your letter ?/polish')">?/polish</button>
    <button class="test-btn" onclick="fillText('?/')">Open palette</button>
  </div>

  <div class="chatbox">
    <div class="messages" id="messages">
      <div class="system-msg">Submit text to check for grammar errors. Try the quick-test buttons above.</div>
    </div>
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Type a message... (use ?/ for commands)"></textarea>
      <button type="button" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="status-bar">
    <span id="backend-status">Checking backend...</span>
    <span>v<span id="ext-version">...</span></span>
  </div>

<script>
  // --- PostMessage bridge for extension fetch ---
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ag-fetch') {
      var req = e.data;
      fetch(req.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: req.body })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          window.postMessage({ type: 'ag-result', id: req.id, data: data }, '*');
        })
        .catch(function(err) {
          window.postMessage({ type: 'ag-error', id: req.id, error: err.message }, '*');
        });
    }
  });

  // --- Chat UI ---
  var textarea = document.getElementById('msg');
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Random AI-like replies to test that the grammar checker only
  // underlines YOUR messages, not random replies.
  var randomReplies = [
    "That's interesting! I would of thought differently about it.",
    "Thanks for sharing — they're approach seems reasonable.",
    "I see what you mean. Its a complex topic for sure.",
    "Good point! There going to need more data to confirm.",
    "Hmm, I hadn't considered that. Your right about the timing.",
    "Let me think about this... the affect on performance is unclear.",
    "Between you and I, this whole thing could of been avoided.",
    "The team has went above and beyond on this project.",
    "I could care less about the deadline — quality matters more.",
    "Each of the developers have their own style, and it works.",
    "She don't think the current approach will scale properly.",
    "We should of tested this earlier in the development cycle.",
    "The data suggests that less people are using this feature now.",
    "Its been a long day but the results are promising so far.",
    "I'm not sure who's responsibility this falls under anymore.",
  ];

  function addRandomReply() {
    var idx = Math.floor(Math.random() * randomReplies.length);
    var reply = randomReplies[idx];
    var div = document.createElement('div');
    div.className = 'message reply-msg';
    div.textContent = reply;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  function addMessage(cls, text) {
    var div = document.createElement('div');
    div.className = 'message ' + cls;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  function sendMessage() {
    var text = textarea.value.trim();
    if (!text) return;
    addMessage('user-msg', text);
    textarea.value = '';
    textarea.style.height = 'auto';

    // Add a random AI-like reply after a short delay so it appears
    // as a separate DOM mutation.  The grammar checker should only
    // underline the user's message (detected by proximity tracking
    // at submit time), NOT the random reply.
    setTimeout(addRandomReply, 800);

    // Call backend for grammar checking
    addMessage('system-msg', 'Checking...');
    fetch('/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, language: 'auto' })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        // Remove "Checking..." message
        var msgs = document.getElementById('messages');
        msgs.removeChild(msgs.lastChild);
        if (!data.errors || data.errors.length === 0) {
          addMessage('system-msg', '✓ No errors found');
        } else {
          data.errors.forEach(function(e) {
            addMessage('system-msg',
              e.type.toUpperCase() + ': "' + e.error + '" → "' + e.correction + '" — ' + e.explanation);
          });
        }
      })
      .catch(function(err) {
        var msgs = document.getElementById('messages');
        if (msgs.lastChild && msgs.lastChild.textContent === 'Checking...') {
          msgs.removeChild(msgs.lastChild);
        }
        addMessage('system-msg', '✗ Error: ' + err.message);
      });
  }

  function fillAndSend(text) {
    textarea.value = text;
    sendMessage();
  }

  function fillText(text) {
    textarea.value = text;
    textarea.focus();
    textarea.dispatchEvent(new Event('input', { bubbles: true }));
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  }

  // --- Backend health check (same-origin, use relative URL) ---
  fetch('/health')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('backend-status').innerHTML = 'Backend: <span class="ok">● connected</span>';
    })
    .catch(function() {
      document.getElementById('backend-status').innerHTML = 'Backend: <span style="color:#f87171">● offline</span>';
    });

  // --- Fetch extension version ---
  fetch('/version')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('ext-version').textContent = d.version || '?';
    })
    .catch(function() {
      document.getElementById('ext-version').textContent = '?';
    });
</script>
</body>
</html>
