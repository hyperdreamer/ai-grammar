<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Grammar Checker — Test Page</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #4ade80;
    --accent-hover: #22c55e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --accent: #16a34a;
      --accent-hover: #15803d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }
  .chatbox {
    flex: 1; display: flex; flex-direction: column;
    max-width: 720px; width: 100%; margin: 0 auto;
    background: var(--surface); border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .message {
    padding: 10px 14px; border-radius: 12px; margin-bottom: 8px;
    max-width: 75%; line-height: 1.5; font-size: 14px;
    word-wrap: break-word;
  }
  .user-msg {
    background: var(--accent); color: #0f172a;
    margin-left: auto; font-weight: 500;
  }
  .reply-msg {
    background: var(--border); margin-right: auto;
  }
  .input-row {
    display: flex; padding: 12px 16px; gap: 8px;
    border-top: 1px solid var(--border);
  }
  .input-row textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 10px 14px; resize: none; outline: none;
    min-height: 44px; max-height: 120px;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row button {
    background: var(--accent); color: #0f172a;
    border: none; border-radius: 12px; padding: 0 24px;
    font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
  }
  .input-row button:hover { background: var(--accent-hover); }
</style>
</head>
<body>
  <div class="chatbox">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <textarea id="msg" rows="1" placeholder="Type a message... (use ?/ for commands)"></textarea>
      <button type="button" id="sendBtn">Send</button>
    </div>
  </div>

<script>
  var textarea = document.getElementById('msg');
  var sendBtn = document.getElementById('sendBtn');
  var messages = document.getElementById('messages');

  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  sendBtn.addEventListener('click', sendMessage);

  var randomReplies = [
    "That's interesting! I would of thought differently about it.",
    "Thanks for sharing — they're approach seems reasonable.",
    "I see what you mean. Its a complex topic for sure.",
    "Good point! There going to need more data to confirm.",
    "Hmm, I hadn't considered that. Your right about the timing.",
    "Let me think about this... the affect on performance is unclear.",
    "Between you and I, this whole thing could of been avoided.",
    "The team has went above and beyond on this project.",
    "I could care less about the deadline — quality matters more.",
    "Each of the developers have their own style, and it works.",
    "She don't think the current approach will scale properly.",
    "We should of tested this earlier in the development cycle.",
    "The data suggests that less people are using this feature now.",
    "Its been a long day but the results are promising so far.",
    "I'm not sure who's responsibility this falls under anymore.",
  ];

  function addMessage(cls, text) {
    var div = document.createElement('div');
    div.className = 'message ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addRandomReply() {
    var idx = Math.floor(Math.random() * randomReplies.length);
    var reply = randomReplies[idx];
    addMessage('reply-msg', reply);
  }

  function sendMessage() {
    var text = textarea.value.trim();
    if (!text) return;
    addMessage('user-msg', text);
    textarea.value = '';
    textarea.style.height = 'auto';

    // Add a random AI-like reply after a short delay so it appears
    // as a separate DOM mutation.  The grammar checker should only
    // underline the user's message (detected by proximity tracking
    // at submit time), NOT the random reply.
    setTimeout(addRandomReply, 800);
  }
</script>
</body>
</html>
