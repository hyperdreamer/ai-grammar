<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Grammar Checker — Test Page</title>
<style>
  :root {
    --ag-bg: #0f172a;
    --ag-surface: #1e293b;
    --ag-border: #334155;
    --ag-text: #e2e8f0;
    --ag-text-muted: #94a3b8;
    --ag-text-dim: #64748b;
    --ag-accent: #4ade80;
    --ag-accent-hover: #22c55e;
    --ag-accent-text: #0f172a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ag-bg: #f8fafc;
      --ag-surface: #ffffff;
      --ag-border: #e2e8f0;
      --ag-text: #0f172a;
      --ag-text-muted: #475569;
      --ag-text-dim: #94a3b8;
      --ag-accent: #16a34a;
      --ag-accent-hover: #15803d;
      --ag-accent-text: #ffffff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--ag-bg); color: var(--ag-text);
    min-height: 100vh; padding: 24px 20px; max-width: 900px; margin: 0 auto;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: var(--ag-text-dim); font-size: 13px; margin-bottom: 24px; }

  /* Sections */
  .section {
    margin-bottom: 20px; border: 1px solid var(--ag-border);
    border-radius: 10px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--ag-surface);
    border-bottom: 1px solid var(--ag-border);
  }
  .section-header h2 { font-size: 14px; font-weight: 600; }
  .mode-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-weight: 600;
  }
  .mode-textarea { background: #1d4ed8; color: #e2e8f0; }
  .mode-editable { background: #6d28d9; color: #e2e8f0; }
  @media (prefers-color-scheme: light) {
    .mode-textarea { background: #3b82f6; color: #ffffff; }
    .mode-editable { background: #8b5cf6; color: #ffffff; }
  }

  /* Editors */
  .editor-wrap { padding: 12px 16px; }
  textarea, [contenteditable] {
    width: 100%; background: var(--ag-bg); border: 1px solid var(--ag-border);
    border-radius: 8px; color: var(--ag-text); font-family: inherit;
    font-size: 14px; padding: 10px 12px; outline: none; resize: none;
    min-height: 52px; line-height: 1.5;
  }
  textarea:focus, [contenteditable]:focus { border-color: var(--ag-accent); }
  [contenteditable]:empty::before {
    content: attr(data-placeholder);
    color: var(--ag-text-dim);
  }
  [contenteditable] { white-space: pre-wrap; word-break: break-word; }

  /* Buttons */
  .btn-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px 12px;
  }
  .btn {
    background: var(--ag-surface); border: 1px solid var(--ag-border);
    color: var(--ag-text); padding: 5px 12px; border-radius: 6px;
    cursor: pointer; font-size: 12px; font-family: inherit;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--ag-border); }
  .btn-cmd { color: var(--ag-accent); font-weight: 600; }

  /* Status */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-top: 1px solid var(--ag-border);
    background: var(--ag-surface);
    font-size: 12px; color: var(--ag-text-muted);
  }
  .status-ok { color: var(--ag-accent); }

  kbd {
    background: var(--ag-border); border: 1px solid var(--ag-text-muted);
    border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 11px;
  }
</style>
</head>
<body>

<h1>🔍 AI Grammar Checker</h1>
<p class="subtitle">
  Test page — two editor modes. Use <kbd>?/</kbd> to open command palette,
  <kbd>↑↓</kbd> to navigate, <kbd>Enter</kbd> to select, <kbd>Esc</kbd> to close.
</p>

<!-- ═══ TEXTAREA ═══ -->
<div class="section" id="ta-section">
  <div class="section-header">
    <h2>Textarea — Regular Sites</h2>
    <span class="mode-badge mode-textarea">TEXTAREA</span>
  </div>
  <div class="editor-wrap">
    <textarea id="ta-editor" rows="1" placeholder="Type a message or ?/ command..."></textarea>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="fillTA('I has a apple and she go to store')">Grammar errors</button>
    <button class="btn" onclick="fillTA('Their going to the party tomorow')">Spelling errors</button>
    <button class="btn" onclick="fillTA('Due to the fact that we are in receipt of your letter')">Wordiness</button>
    <span style="margin:0 4px;color:var(--ag-border)">│</span>
    <button class="btn btn-cmd" onclick="fillTA('?/')">?/ palette</button>
    <button class="btn btn-cmd" onclick="fillTA('?/lang ')" title="42 languages">?/lang palette</button>
    <button class="btn btn-cmd" onclick="fillTA('Hello world ?/lang ja')">?/lang ja</button>
    <button class="btn btn-cmd" onclick="fillTA('I has a apple ?/fix')">?/fix</button>
    <button class="btn btn-cmd" onclick="fillTA('due to the fact that ?/polish')">?/polish</button>
    <button class="btn btn-cmd" onclick="fillTA('I has a apple ?/check')">?/check</button>
    <button class="btn btn-cmd" onclick="fillTA('?/off')">?/off</button>
    <button class="btn btn-cmd" onclick="fillTA('?/on')">?/on</button>
  </div>
  <div class="status-bar">
    <span id="ta-status">Ready — type <kbd>?/</kbd> for commands</span>
    <span id="ta-count">0 chars</span>
  </div>
</div>

<!-- ═══ contentEditable ═══ -->
<div class="section" id="ce-section">
  <div class="section-header">
    <h2>ContentEditable — WhatsApp-style</h2>
    <span class="mode-badge mode-editable">contentEditable</span>
  </div>
  <div class="editor-wrap">
    <div id="ce-editor" contenteditable="true" role="textbox"
         data-placeholder="Type a message or ?/ command..."></div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="fillCE('I has a apple and she go to store')">Grammar errors</button>
    <button class="btn" onclick="fillCE('Their going to the party tomorow')">Spelling errors</button>
    <button class="btn" onclick="fillCE('Due to the fact that we are in receipt of your letter')">Wordiness</button>
    <span style="margin:0 4px;color:var(--ag-border)">│</span>
    <button class="btn btn-cmd" onclick="fillCE('?/')">?/ palette</button>
    <button class="btn btn-cmd" onclick="fillCE('?/lang ')" title="42 languages">?/lang palette</button>
    <button class="btn btn-cmd" onclick="fillCE('Hello world ?/lang ja')">?/lang ja</button>
    <button class="btn btn-cmd" onclick="fillCE('I has a apple ?/fix')">?/fix</button>
    <button class="btn btn-cmd" onclick="fillCE('due to the fact that ?/polish')">?/polish</button>
    <button class="btn btn-cmd" onclick="fillCE('I has a apple ?/check')">?/check</button>
    <button class="btn btn-cmd" onclick="fillCE('?/off')">?/off</button>
    <button class="btn btn-cmd" onclick="fillCE('?/on')">?/on</button>
  </div>
  <div class="status-bar">
    <span id="ce-status">Ready — type <kbd>?/</kbd> for commands</span>
    <span id="ce-count">0 chars</span>
  </div>
</div>

<script>
// ── PostMessage bridge for extension fetch ──────────────────────────
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'ag-fetch') {
    var req = e.data;
    fetch(req.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: req.body })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        window.postMessage({ type: 'ag-result', id: req.id, data: data }, '*');
      })
      .catch(function(err) {
        window.postMessage({ type: 'ag-error', id: req.id, error: err.message }, '*');
      });
  }
});

// ── Helpers ──────────────────────────────────────────────────────────
function fillTA(text) {
  var ta = document.getElementById('ta-editor');
  ta.value = text;
  ta.focus();
  ta.dispatchEvent(new Event('input', { bubbles: true }));
}

function fillCE(text) {
  var ce = document.getElementById('ce-editor');
  ce.textContent = text;
  ce.focus();
  // Place cursor at end
  var sel = window.getSelection();
  var range = document.createRange();
  range.selectNodeContents(ce);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
  ce.dispatchEvent(new Event('input', { bubbles: true }));
}

// ── Live char counts ─────────────────────────────────────────────────
var taEl = document.getElementById('ta-editor');
var ceEl = document.getElementById('ce-editor');

taEl.addEventListener('input', function() {
  document.getElementById('ta-count').textContent = taEl.value.length + ' chars';
});
ceEl.addEventListener('input', function() {
  var len = (ceEl.textContent || '').length;
  document.getElementById('ce-count').textContent = len + ' chars';
});

// ── Backend health check ─────────────────────────────────────────────
fetch('/health')
  .then(function(r) { return r.json(); })
  .then(function() {
    document.getElementById('ta-status').innerHTML =
      'Backend: <span class="status-ok">● connected</span>';
    document.getElementById('ce-status').innerHTML =
      'Backend: <span class="status-ok">● connected</span>';
  })
  .catch(function() {
    document.getElementById('ta-status').textContent = 'Backend: ● offline';
    document.getElementById('ce-status').textContent = 'Backend: ● offline';
  });
</script>
</body>
</html>
