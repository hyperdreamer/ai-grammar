<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Grammar — Commands Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    padding: 20px;
  }
  h2 { font-size: 16px; margin-bottom: 8px; color: #94a3b8; }
  .section { margin-bottom: 24px; border: 1px solid #334155; border-radius: 10px; padding: 16px; }
  textarea {
    width: 100%; background: #1e293b; border: 1px solid #334155;
    border-radius: 8px; color: #e2e8f0; font-family: inherit;
    font-size: 14px; padding: 10px 12px; resize: none; outline: none;
    min-height: 60px;
  }
  textarea:focus { border-color: #4ade80; }
  #contenteditable-editor {
    width: 100%; min-height: 60px; background: #1e293b;
    border: 1px solid #334155; border-radius: 8px;
    color: #e2e8f0; font-size: 14px; padding: 10px 12px;
    outline: none; white-space: pre-wrap; word-break: break-word;
  }
  #contenteditable-editor:focus { border-color: #4ade80; }
  #contenteditable-editor:empty::before {
    content: "Type here (contentEditable, like WhatsApp)...";
    color: #64748b;
  }
  #log {
    margin-top: 16px; padding: 12px; background: #1e293b;
    border-radius: 8px; font-family: monospace; font-size: 12px;
    white-space: pre-wrap; max-height: 400px; overflow-y: auto;
    border: 1px solid #334155;
  }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }
</style>
</head>
<body>
  <div class="section">
    <h2>1. TEXTAREA (regular sites)</h2>
    <textarea id="textarea-editor" placeholder="Type here (TEXTAREA)..."></textarea>
  </div>
  <div class="section">
    <h2>2. contentEditable (WhatsApp-like)</h2>
    <div id="contenteditable-editor" contenteditable="true" role="textbox"></div>
  </div>
  <div id="log">🔍 Test log:
</div>
</body>
</html>
