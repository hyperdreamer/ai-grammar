<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Grammar Checker</title>
  <style>
    :root {
      --ag-bg: #0f172a;
      --ag-surface: #1e293b;
      --ag-border: #334155;
      --ag-text: #e2e8f0;
      --ag-text-muted: #94a3b8;
      --ag-text-dim: #64748b;
      --ag-accent: #4ade80;
      --ag-accent-hover: #22c55e;
      --ag-accent-text: #0f172a;
      --ag-error: #f87171;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --ag-bg: #ffffff;
        --ag-surface: #f8fafc;
        --ag-border: #e2e8f0;
        --ag-text: #0f172a;
        --ag-text-muted: #475569;
        --ag-text-dim: #64748b;
        --ag-accent: #16a34a;
        --ag-accent-hover: #15803d;
        --ag-accent-text: #ffffff;
        --ag-error: #dc2626;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--ag-bg);
      color: var(--ag-text);
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon { font-size: 18px; }
    .section {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--ag-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--ag-border);
      border-radius: 6px;
      background: var(--ag-surface);
      color: var(--ag-text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      border-color: var(--ag-accent);
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-row label {
      margin-bottom: 0;
      font-size: 13px;
      color: var(--ag-text);
      text-transform: none;
      letter-spacing: 0;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--ag-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: var(--ag-text);
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: var(--ag-accent);
    }
    .toggle input:checked + .slider::after {
      transform: translateX(20px);
      background: var(--ag-accent-text);
    }
    .shortcut-hint {
      font-size: 11px;
      color: var(--ag-text-dim);
      margin-top: 12px;
      text-align: center;
    }
    .shortcut-hint kbd {
      background: var(--ag-surface);
      border: 1px solid var(--ag-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
    }
    .status {
      font-size: 11px;
      color: var(--ag-accent);
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
      transition: opacity 0.3s;
    }
    .test-btn {
      width: 100%;
      padding: 10px 0;
      border: 1px solid var(--ag-accent);
      border-radius: 8px;
      background: transparent;
      color: var(--ag-accent);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .test-btn:hover {
      background: color-mix(in srgb, var(--ag-accent) 10%, transparent);
    }
    .backend-status {
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .backend-status .dot {
      width: 6px; height: 6px; border-radius: 50%; display: inline-block;
    }
    .backend-status .dot.online { background: var(--ag-accent); }
    .backend-status .dot.offline { background: var(--ag-error); }
  </style>
</head>
<body>
  <h1><span class="icon">🔍</span> AI Grammar Checker</h1>

  <div class="toggle-row">
    <label for="enabled">Enabled</label>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <label for="language">Language</label>
    <select id="language">
      <option value="auto">Auto-detect</option>
      <option value="English">English</option>
      <option value="Chinese">Chinese</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Spanish">Spanish</option>
      <option value="Russian">Russian</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Italian">Italian</option>
      <option value="Arabic">Arabic</option>
    </select>
  </div>

  <div class="section">
    <label for="host">Backend host</label>
    <div class="row">
      <input type="text" id="host" placeholder="127.0.0.1" value="127.0.0.1">
      <input type="number" id="port" placeholder="8766" value="8766" style="max-width:80px;">
    </div>
  </div>

  <div class="section">
    <label for="live-delay">Live check: delay (s) / min chars</label>
    <div class="row">
      <input type="number" id="live-delay" placeholder="5" value="5" min="1" max="30">
      <input type="number" id="live-min-chars" placeholder="30" value="30" min="5" max="500" style="max-width:80px;" title="Min characters">
    </div>
  </div>

  <div class="section">
    <label for="max-tokens">Max tokens (0 = unbounded)</label>
    <input type="number" id="max-tokens" placeholder="4096" value="4096" min="0" max="16384">
  </div>

  <div class="shortcut-hint">
    Manual check: select text and press <kbd>Ctrl+Shift+G</kbd>
  </div>

  <button class="test-btn" id="test-page">🧪 Open Test Page</button>

  <div class="backend-status" id="backend-status">
    <span class="dot offline"></span> Backend offline
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
