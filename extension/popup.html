<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Grammar Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon { font-size: 18px; }
    .section {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      border-color: #4ade80;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-row label {
      margin-bottom: 0;
      font-size: 13px;
      color: #e2e8f0;
      text-transform: none;
      letter-spacing: 0;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #e2e8f0;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4ade80;
    }
    .toggle input:checked + .slider::after {
      transform: translateX(20px);
      background: #0f172a;
    }
    .shortcut-hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 12px;
      text-align: center;
    }
    .shortcut-hint kbd {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
    }
    .status {
      font-size: 11px;
      color: #4ade80;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <h1><span class="icon">🔍</span> AI Grammar Checker</h1>

  <div class="toggle-row">
    <label for="enabled">Enabled</label>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <label for="language">Language</label>
    <select id="language">
      <option value="auto">Auto-detect</option>
      <option value="English">English</option>
      <option value="Chinese">Chinese</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Spanish">Spanish</option>
      <option value="Russian">Russian</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Italian">Italian</option>
      <option value="Arabic">Arabic</option>
    </select>
  </div>

  <div class="section">
    <label for="host">Backend host</label>
    <div class="row">
      <input type="text" id="host" placeholder="127.0.0.1" value="127.0.0.1">
      <input type="number" id="port" placeholder="8766" value="8766" style="max-width:80px;">
    </div>
  </div>

  <div class="shortcut-hint">
    Manual check: select text and press <kbd>Ctrl+Shift+G</kbd>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
