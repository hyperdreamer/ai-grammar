# AI Grammar Checker — Backend Configuration
#
# Copy this file to config.yaml and fill in your settings.
# config.yaml is gitignored.

# --- Server listen address ---
server:
  host: 127.0.0.1
  port: 8766

# Enable detailed debug logging to stderr (request/response timing, provider calls).
# Shows: incoming requests, AI provider calls, response sizes, error counts.
# Set to false for production.
debug: false

ai:
  # Model to use for grammar checking.
  # Smaller/faster models (gpt-4o-mini, claude-haiku, deepseek-chat) work well
  # and are much cheaper than flagship models for this task.
  model: gpt-4o-mini

  # API base URL. /v1 is auto-appended if omitted.
  # Examples:
  #   OpenAI:        https://api.openai.com
  #   Tencent TokenHub: https://tokenhub.tencentmaas.com
  #   chat2api:      http://127.0.0.1:8000
  #   DeepSeek:      https://api.deepseek.com
  api_base: https://api.openai.com

  # --- API Key ---
  # $ prefix: read from environment variable (recommended).
  # No prefix: inline key directly in this file.
  api_key: $OPENAI_API_KEY

  # --- Timeouts (all values in seconds) ---
  timeout:
    connect: 10     # TCP/TLS handshake
    read: 300        # Waiting for AI response (grammar checks are fast)
    write: 60        # Sending request body
    pool: 10         # Connection pool acquire
